<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block" rel="stylesheet">
<style>
@keyframes phspin { to { transform: rotate(360deg); } }
</style>
</helmet>
<div style="{{ wrapStyle }}">
  <div style="{{ labelStyle }}">{{ label }}</div>
  <div style="{{ deviceStyle }}">
    <div style="{{ statusStyle }}">
      <span style="{{ timeStyle }}">{{ timeText }}</span>
      <div style="{{ statusIconsStyle }}">
        <span style="{{ statIconStyle }}">signal_cellular_alt</span>
        <span style="{{ statIconStyle }}">wifi</span>
        <span style="{{ statIconStyle }}">battery_full</span>
      </div>
    </div>
    <div style="{{ appBarStyle }}">
      <div style="{{ appTitleStyle }}">{{ title }}</div>
      <div style="{{ gearWrapStyle }}"><span style="{{ gearStyle }}">settings</span></div>
    </div>
    <sc-if value="{{ hasBanner }}" hint-placeholder-val="{{ true }}">
      <div style="{{ bannerStyle }}">
        <span style="{{ bannerIconStyle }}">{{ bannerIcon }}</span>
        <span style="{{ bannerTextStyle }}">{{ bannerText }}</span>
        <sc-if value="{{ bannerAction }}" hint-placeholder-val="{{ true }}">
          <span style="{{ bannerActionStyle }}">RECONNECT</span>
        </sc-if>
      </div>
    </sc-if>
    <div style="{{ tabRowStyle }}">
      <div style="{{ tabWatchStyle }}">Watchlist</div>
      <div style="{{ tabSearchStyle }}">Search</div>
    </div>
    <div style="{{ contentStyle }}">{{ children }}</div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:384,&quot;height&quot;:840},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;default&quot;:&quot;light&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Watchlist&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Watchlist&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;tab&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;watchlist&quot;,&quot;search&quot;],&quot;default&quot;:&quot;watchlist&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;banner&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;none&quot;,&quot;demo&quot;,&quot;error&quot;,&quot;connecting&quot;,&quot;reconnect&quot;],&quot;default&quot;:&quot;none&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  pal(t) {
    if (t === 'dark') return { bg:'#121316', surface:'#1D1F23', surfaceHi:'#25272B', onBg:'#E3E2E6', onVar:'#9BA1AB', outline:'#3A3D42', outlineFaint:'#2A2C30', primary:'#A8C7FA', demoBg:'#3A3320', demoFg:'#F5D98B', errBg:'#4A2224', errFg:'#F2B8B5', infoBg:'#1E2A3E', infoFg:'#A8C7FA', statusFg:'#E3E2E6', shadow:'rgba(0,0,0,.45)' };
    return { bg:'#F7F9FC', surface:'#FFFFFF', surfaceHi:'#EEF1F6', onBg:'#1A1C1E', onVar:'#5A5E66', outline:'#D6DAE1', outlineFaint:'#E9ECF1', primary:'#0B57D0', demoBg:'#FDF3D3', demoFg:'#7A5B00', errBg:'#FCE8E6', errFg:'#B3261E', infoBg:'#E8F0FE', infoFg:'#0B57D0', statusFg:'#1A1C1E', shadow:'rgba(20,30,50,.14)' };
  }
  renderVals() {
    const p = this.pal(this.props.theme);
    const tab = this.props.tab || 'watchlist';
    const b = this.props.banner || 'none';
    let bn = null;
    if (b === 'demo') bn = { bg:p.demoBg, fg:p.demoFg, icon:'warning', text:'Demo mode — set API key in Settings', spin:false, action:false };
    else if (b === 'error') bn = { bg:p.errBg, fg:p.errFg, icon:'error', text:'API key error — update in Settings', spin:false, action:false };
    else if (b === 'connecting') bn = { bg:p.infoBg, fg:p.infoFg, icon:'autorenew', text:'Connecting…', spin:true, action:false };
    else if (b === 'reconnect') bn = { bg:p.surfaceHi, fg:p.onBg, icon:'cloud_off', text:'Live updates paused.', spin:false, action:true };
    const icoBase = `font-family:'Material Symbols Outlined';line-height:1;`;
    const tabBase = `flex:1;text-align:center;padding:14px 0 12px;font:500 14px Roboto,sans-serif;cursor:pointer;`;
    const activeTab = `${tabBase}color:${p.primary};box-shadow:inset 0 -3px 0 ${p.primary};`;
    const idleTab = `${tabBase}color:${p.onVar};`;
    return {
      label: this.props.label, title: this.props.title || 'Watchlist', timeText: '9:41',
      children: this.props.children,
      hasBanner: !!bn,
      bannerText: bn ? bn.text : '', bannerIcon: bn ? bn.icon : '', bannerAction: bn ? bn.action : false,
      wrapStyle: `display:flex;flex-direction:column;align-items:center;gap:12px;`,
      labelStyle: `font:500 12px 'Roboto Mono',monospace;color:#5B6470;letter-spacing:.3px;text-align:center;max-width:360px;`,
      deviceStyle: `width:360px;height:800px;border-radius:38px;overflow:hidden;background:${p.bg};border:1px solid ${p.outline};display:flex;flex-direction:column;box-shadow:0 18px 40px ${p.shadow};`,
      statusStyle: `display:flex;align-items:center;justify-content:space-between;padding:12px 22px 6px;background:${p.bg};`,
      timeStyle: `font:500 13px Roboto,sans-serif;color:${p.statusFg};`,
      statusIconsStyle: `display:flex;align-items:center;gap:7px;`,
      statIconStyle: `${icoBase}font-size:16px;color:${p.statusFg};`,
      appBarStyle: `display:flex;align-items:center;justify-content:space-between;padding:6px 8px 10px 20px;background:${p.bg};`,
      appTitleStyle: `font:500 22px Roboto,sans-serif;color:${p.onBg};`,
      gearWrapStyle: `width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:50%;`,
      gearStyle: `${icoBase}font-size:24px;color:${p.onVar};`,
      bannerStyle: bn ? `display:flex;align-items:center;gap:10px;padding:11px 18px;background:${bn.bg};` : ``,
      bannerIconStyle: bn ? `${icoBase}font-size:18px;color:${bn.fg};${bn.spin ? 'animation:phspin 1.1s linear infinite;' : ''}` : ``,
      bannerTextStyle: bn ? `flex:1;font:500 13px Roboto,sans-serif;color:${bn.fg};` : ``,
      bannerActionStyle: bn ? `font:600 12px Roboto,sans-serif;letter-spacing:.6px;color:${bn.fg};` : ``,
      tabRowStyle: `display:flex;background:${p.surface};border-bottom:1px solid ${p.outlineFaint};`,
      tabWatchStyle: tab === 'watchlist' ? activeTab : idleTab,
      tabSearchStyle: tab === 'search' ? activeTab : idleTab,
      contentStyle: `flex:1;overflow:hidden;display:flex;flex-direction:column;background:${p.bg};`
    };
  }
}
</script>
</body>
</html>
