name: openspec-plannotator-gate
version: 1
description: Human-gated spec-driven workflow - the human writes the proposal, approves the plan at the Spec Gate before any code is written, and approves the code before it is archived
artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: |
      Create the proposal document that establishes WHY this change is needed.

      Sections:
      - **Why**: 1-2 sentences on the problem or opportunity. What problem does this solve? Why now?
      - **What Changes**: Bullet list of changes. Be specific about new capabilities, modifications, or removals. Mark breaking changes with **BREAKING**.
      - **Capabilities**: Identify which specs will be created or modified:
        - **New Capabilities**: List capabilities being introduced. Each becomes a new `specs/<name>/spec.md`. Use kebab-case names (e.g., `user-auth`, `data-export`).
        - **Modified Capabilities**: List existing capabilities whose REQUIREMENTS are changing. Only include if spec-level behavior changes (not just implementation details). Each needs a delta spec file. Check `openspec/specs/` for existing spec names. Leave empty if no requirement changes.
      - **Impact**: Affected code, APIs, dependencies, or systems.

      IMPORTANT: The Capabilities section is critical. It creates the contract between
      proposal and specs phases. Research existing specs before filling this in.
      Each capability listed here will need a corresponding spec file.

      Keep it concise (1-2 pages). Focus on the "why" not the "how" -
      implementation details belong in design.md.

      This is the foundation - specs, design, and tasks all build on this.
    requires: []

  - id: specs
    generates: "specs/**/*.md"
    description: Detailed specifications for the change
    template: spec.md
    instruction: |
      Create specification files that define WHAT the system should do.

      Create one spec file per capability listed in the proposal's Capabilities section.
      - New capabilities: use the exact kebab-case name from the proposal (specs/<capability>/spec.md).
      - Modified capabilities: use the existing spec folder name from openspec/specs/<capability>/ when creating the delta spec at specs/<capability>/spec.md.

      Delta operations (use ## headers):
      - **ADDED Requirements**: New capabilities
      - **MODIFIED Requirements**: Changed behavior - MUST include full updated content
      - **REMOVED Requirements**: Deprecated features - MUST include **Reason** and **Migration**
      - **RENAMED Requirements**: Name changes only - use FROM:/TO: format

      Format requirements:
      - Each requirement: `### Requirement: <name>` followed by description
      - Use SHALL/MUST for normative requirements (avoid should/may)
      - Each scenario: `#### Scenario: <name>` with WHEN/THEN format
      - **CRITICAL**: Scenarios MUST use exactly 4 hashtags (`####`). Using 3 hashtags or bullets will fail silently.
      - Every requirement MUST have at least one scenario.

      MODIFIED requirements workflow:
      1. Locate the existing requirement in openspec/specs/<capability>/spec.md
      2. Copy the ENTIRE requirement block (from `### Requirement:` through all scenarios)
      3. Paste under `## MODIFIED Requirements` and edit to reflect new behavior
      4. Ensure header text matches exactly (whitespace-insensitive)

      Common pitfall: Using MODIFIED with partial content loses detail at archive time.
      If adding new concerns without changing existing behavior, use ADDED instead.

      Example:
      ```
      ## ADDED Requirements

      ### Requirement: User can export data
      The system SHALL allow users to export their data in CSV format.

      #### Scenario: Successful export
      - **WHEN** user clicks "Export" button
      - **THEN** system downloads a CSV file with all user data

      ## REMOVED Requirements

      ### Requirement: Legacy export
      **Reason**: Replaced by new export system
      **Migration**: Use new export endpoint at /api/v2/export
      ```

      Specs should be testable - each scenario is a potential test case.
    requires:
      - proposal

  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: |
      Create the design document that explains HOW to implement the change.

      When to include design.md (create only if any apply):
      - Cross-cutting change (multiple services/modules) or new architectural pattern
      - New external dependency or significant data model changes
      - Security, performance, or migration complexity
      - Ambiguity that benefits from technical decisions before coding

      Sections:
      - **Context**: Background, current state, constraints, stakeholders
      - **Goals / Non-Goals**: What this design achieves and explicitly excludes
      - **Decisions**: Key technical choices with rationale (why X over Y?). Include alternatives considered for each decision.
      - **Risks / Trade-offs**: Known limitations, things that could go wrong. Format: [Risk] → Mitigation
      - **Migration Plan**: Steps to deploy, rollback strategy (if applicable)
      - **Open Questions**: Outstanding decisions or unknowns to resolve

      Focus on architecture and approach, not line-by-line implementation.
      Reference the proposal for motivation and specs for requirements.

      Good design docs explain the "why" behind technical decisions.
    requires:
      - proposal

  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    instruction: |
      Create the task list that breaks down the implementation work.

      **IMPORTANT: Follow the template below exactly.** The apply phase parses
      checkbox format to track progress. Tasks not using `- [ ]` won't be tracked.

      Guidelines:
      - Group related tasks under ## numbered headings
      - Each task MUST be a checkbox: `- [ ] X.Y Task description`
      - Tasks should be small enough to complete in one session
      - Order tasks by dependency (what must be done first?)
      - The template's final group, "Landing", MUST be kept. Renumber it so it comes
        last; never drop, reorder, or reword it. It carries the Implementation Gate,
        without which the change cannot be archived.

      Example:
      ```
      ## 1. Setup

      - [ ] 1.1 Create new module structure
      - [ ] 1.2 Add dependencies to package.json

      ## 2. Core Implementation

      - [ ] 2.1 Implement data export function
      - [ ] 2.2 Add CSV formatting utilities

      ## 3. Landing

      - [ ] 3.1 Implementation Gate - commit the implementation (do not ask), then
            run `plannotator review`. Annotations are instructions, not suggestions:
            carry out every one (say so briefly if you disagree, then do it anyway),
            and sync the specs yourself if the code now does something they do not
            describe. Re-review until the human approves. Tick ONLY once they have.
      - [ ] 3.2 Land - invoke the `openspec-archive-guard` skill, then archive the
            change and commit. If the repo has a GitHub remote, push the branch and
            give the human a compare link to open the PR themselves (do not create
            it); if it is local-only, tell the human it is landed and theirs to merge
            or squash back into the base branch (recorded in spec-review.md).
      ```

      Reference specs for what needs to be built, design for how to build it.
      Each task should be verifiable - you know when it's done.
    requires:
      - specs
      - design

  - id: spec-review
    generates: spec-review.md
    description: Human approval of the planning artifacts - the Spec Gate
    template: spec-review.md
    instruction: |
      You have reached the **Spec Gate**. Unlike the other artifacts, you do NOT author
      this one - it is opened by running Plannotator and its content is a record of the
      human's decision. If you arrived here from a fast-forward flow (`/opsx:ff`,
      `/opsx:propose`) that was creating artifacts in a loop, that loop ends here: the
      remaining "artifact" is a human approval, not something to write. Carry out the
      steps below; do not stop short of them, and do not skip ahead and write the file.

      **This is a real stopping point, so make the hand-off explicit - never end after
      `tasks.md` in silence.** The gate is opened by `plannotator annotate ... --gate`,
      a command that launches a browser and blocks on the human. Two ways to proceed:
        - If you can run that interactive command and wait for it to return, do so (steps
          below) and act on the decision it prints.
        - If you cannot reliably drive a long-blocking, browser-launching command (some
          harnesses can't), then STOP after step 3 and hand the human the exact command
          to run themselves - print it and say the gate is theirs to open. Do not report
          "done" or "ready to implement" as if the gate had passed; it has not.

      **The git steps below are part of the gate. Perform them without asking.** This
      instruction is your authorisation to branch and commit for this change: the human
      chose this flow precisely so the checkpoints happen on their own. Do not stop to
      ask "shall I commit?" - the only question this gate asks the human is the one
      Plannotator asks them.

      Do not create `spec-review.md` until Plannotator returns `approved`. Writing it
      any earlier - to "finish the loop", to unblock `/opsx:apply`, or on the human's
      behalf - forges the approval and defeats the gate.

      Steps:

      1. Put the work on its own branch. Note the branch you are on now - it is the
         **base branch**, the one this change will merge back into at landing. Record it.
         If the current branch is the default branch (`main`/`master`), create
         `openspec/<change-name>` - uncommitted change files come along with the
         checkout. If already on some other branch, ASK whether to reuse it or cut a
         fresh one; never silently absorb a change into unrelated work. (This is the one
         git decision that is the human's.) When you cut a fresh branch from another, the
         base branch is the one you branched from, not the default branch.

      2. Run `openspec validate <change-name> --strict`. If it fails, fix the artifacts
         and re-run. Never open the gate on artifacts the tool would reject - it wastes
         the human's attention, which is the scarcest thing in this loop.

      3. Commit the artifacts on the branch. This is what the human is about to review,
         and the commit it is reviewed against. Commit it yourself; do not ask.

      4. Open the gate:
         ```bash
         plannotator annotate <change-dir>/ --gate --json
         ```
         This renders the artifacts as documents with an Approve button. It blocks while
         the human reviews, then prints one JSON object to stdout and the decision is
         made. That printed JSON is the authoritative, terminal result - read the
         `decision` field from it. The command starting a local review server that keeps
         listening afterwards does NOT mean the decision is still pending; only a
         `decision` of `pending` (see below) means that. Do not end your turn reporting
         "no feedback" or "still waiting" once a non-`pending` decision has printed.

      5. Act on the `decision` field. These are the literal values plannotator emits -
         match on them exactly; do not infer from prose:
         - `approved` -> the human approved. Write this file (see template), recording the
           verdict, the SHA of the commit from step 3, the branch, and the base branch
           from step 1. Then **commit this file immediately**, without asking - it is the
           checkpoint that seals the verdict:
           `git commit -m "spec gate: approved <change-name>"`.
           Implementation is now unblocked.
         - `annotated` -> **this is a change request, not an approval.** The human left
           feedback in the `feedback` field instead of approving. Read it, carry out every
           point (it is instructions, not suggestions), commit the revised artifacts
           without asking, and go back to step 2 to re-gate. Do NOT write this file.
         - `questions` -> the human asked questions (in `feedback`). Answer them in the
           chat, then reopen the gate from step 4. A question is not an approval. Do NOT
           write this file.
         - `rejected` -> the human rejected the plan. Stop and work out with them what
           should happen; do not proceed or write this file.
         - `pending` -> no decision was recorded (the human closed the gate without
           acting, or it has not resolved). Nothing was decided - do not treat this as
           approval or as failure. Reopen the gate from step 4.

      6. Report: the branch, the approved commit SHA, and that `/opsx:apply` is now
         unblocked. Nothing is left for the human to commit.

      If the artifacts change after approval, this file is stale: the human approved a
      version that no longer exists. Re-run the gate from step 2 and rewrite it.
    requires:
      - specs
      - design
      - tasks

apply:
  requires: [tasks, spec-review]
  tracks: tasks.md
  instruction: |
    Read context files, work through pending tasks, mark complete as you go.
    Pause if you hit blockers or need clarification.

    **Commit as you go, without asking.** This flow's checkpoints are automatic - the
    human enrolled the repo precisely so they do not have to authorise each one. Never
    stop to ask "shall I commit?". The only decisions that belong to the human are the
    Verdicts at the two gates.

    The final task group is the Landing group. It carries the Implementation Gate:
    commit the implementation, run `plannotator review`, address every annotation, and
    tick it ONLY once the human has approved. The commit is yours to make; the approval
    is theirs to give.

    ## Conducting the review loop

    **Review annotations are instructions, not suggestions.** The human is not opening a
    debate - they are telling you what to change. Carry out every annotation.

    You may disagree, and you should say so when you do: state your objection plainly and
    briefly - scope creep, spec conflict, a correctness concern - and then DO IT ANYWAY.
    Your opinion is worth one short paragraph, not a refusal. Never end a review round
    having argued instead of acted; that forces the human to repeat themselves, which is
    the exact cost this flow exists to remove.

    The only annotations you do not simply execute are ones you cannot execute: genuinely
    ambiguous, or destructive of something the human likely cannot see. Then ask - and ask
    inside the same round, not by ending your turn.

    **Keep the planning artifacts in sync yourself.** After changing code in response to
    review, ask: do the specs - and the design, and the tasks - still describe what the
    code now does? If the change now commits the system to behaviour the artifacts are
    silent on or contradict, reconcile them. Use `/opsx:update` (the `openspec-update-change`
    skill) for the mechanics: it edits the concrete `existingOutputPaths` for each artifact,
    reconciles every existing artifact against the change in both directions (a spec edit may
    ripple into design.md or tasks.md, not only the reverse), and pulls each artifact's rules
    and template before a substantial rewrite. Then commit.

    **One deliberate override of `/opsx:update`:** it normally confirms each edit with the
    human before writing. In this flow, do NOT stop to confirm - sync autonomously. The
    confirmation happens downstream, in the next `plannotator review` round, whose diff
    includes these edits. Asking here is the round-trip this flow exists to remove. Say what
    you synced and why; do not ask permission for it.

    Spec edits at this stage do NOT reopen the Spec Gate. They are reviewed where they
    land: in the next `plannotator review` round.

    Then land the change: invoke the `openspec-archive-guard` skill BEFORE archiving -
    it checks that the human actually approved the implementation, that nothing drifted
    since, and that the tree is clean. Nothing in the OpenSpec CLI enforces this
    (`openspec archive -y` will archive an unreviewed change and exit 0), so the guard
    is the only thing standing between an unreviewed change and the main specs. Then
    archive and commit - without asking.

    ## Merging back

    This is the final step. How the landed branch reaches the base branch (recorded as
    "Base branch" in spec-review.md) depends on whether the repo has a GitHub remote
    (`git remote get-url origin` succeeds and points at github.com):

    - **GitHub remote present** -> push the branch, then **hand the human a link to open
      the PR themselves** in the GitHub UI. Do NOT create the PR yourself.
        1. `git push -u origin openspec/<change>`
        2. Build the compare URL from the origin remote. Normalise it to `owner/repo`
           (strip a `.git` suffix; handle both `https://github.com/owner/repo` and
           `git@github.com:owner/repo`), then:
           `https://github.com/<owner>/<repo>/compare/<base>...openspec/<change>?expand=1`
        3. Print the URL and stop. Opening it lands the human on GitHub's "Open a pull
           request" form, targeting the base branch, ready to submit. The PR is the merge
           vehicle and a record; nobody reviews it - review already happened at the gates.
      Do not merge a GitHub-hosted change locally.
    - **No remote (local-only repo)** -> there is nothing to push, and merging back is
      out of scope for this flow. Tell the human the change is landed on
      `openspec/<change>` and it is theirs to merge or squash into the base branch
      (recorded as "Base branch" in spec-review.md) whenever they choose. Do not merge,
      squash, or delete the branch yourself.

    If review feedback requires spec changes, edit the spec files and keep implementing.
    The Spec Gate does not reopen.
